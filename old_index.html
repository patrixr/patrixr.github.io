<html>      
    <head>
        <title></title>
        <script src="scripts/processing.min.js"></script>
        <link rel="stylesheet" href="/vendor/fontawesome/css/font-awesome.min.css"/>
        <link rel="stylesheet" href="/vendor/animate.css/animate.min.css"/>
        <style>
            body {
                /*background-color: #141414;*/
                font-family: helvetica;
                font-size: 20px;
                color: #8a8a8a;
            }

            .clickable {
                cursor: pointer;
                -webkit-touch-callout: none;
                -webkit-user-select: none;
                -khtml-user-select: none;
                -moz-user-select: none;
                -ms-user-select: none;
                user-select: none;
            }

            .hard-centered {
                left: 50%;
                transform: translateX(-50%);
                position: absolute;
            }
            
            .header {
                width: 100%;
                height: 100px;
                display: flex;
                padding: 30px
            }
            
            .content {
                position: absolute;
                width: 100%;
            }

            canvas {
                outline: none;
                -webkit-tap-highlight-color: rgba(255, 255, 255, 0); /* mobile webkit */
                border: 15px solid #3e2b14;
                background-color: white;
                padding: 10px;
            }

            .button {
                font-weight: 100;
                position: relative;
                min-width: 40px;
                height: 40px;
                border-radius: 10px;
                margin-left: 15px;
            }

            .button:hover {
                color: #222;
            }
        
        </style>
    </head>
    <body>
        <div class="animated fadeIn header">
            <div class="label">Patrick Rabier</div>
            <div class="clickable button">Test</div>
            <div class="clickable button">Test</div>
        </div>

        <div class="content">
            <canvas class="hard-centered" data-processing-sources="/processing/images.pde"></canvas>
        </div>
    </body>
</html>
